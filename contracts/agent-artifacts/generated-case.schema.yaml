schema_id: agent-artifact.generated-case.v1
description: Agent 生成测试用例草案契约
required:
  - artifact_id
  - artifact_type
  - agent
  - source_task
  - target_asset
  - generated_content
  - assumptions
  - risk
  - quality_checks
  - review
fields:
  artifact_id:
    type: string
  artifact_type:
    type: string
    enum:
      - generated_case
  agent:
    type: object
    required:
      - role
      - version
  source_task:
    type: object
    required:
      - type
      - ref
  target_asset:
    type: object
    required:
      - contract
      - path
    fields:
      contract:
        type: string
        const: contracts/test-assets/case.schema.yaml
      path:
        type: string
  generated_content:
    type: object
    required:
      - case
    fields:
      case:
        type: object
        description: 必须符合 test-assets/case.schema.yaml
  assumptions:
    type: array
    items:
      type: string
  risk:
    type: object
    required:
      - level
      - impact_tags
  quality_checks:
    type: object
    required:
      - traceability_check
      - fixture_reference_check
      - validator_reference_check
      - executable_intent_check
  review:
    type: object
    required:
      - status
