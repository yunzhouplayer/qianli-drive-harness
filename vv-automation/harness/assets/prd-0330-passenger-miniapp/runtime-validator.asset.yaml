---
id: VALIDATOR-0330-PASSENGER-MINIAPP-001
version: v1
title: 0330 乘客端小程序通用确定性校验器
description: 校验页面状态、接口回调、推荐列表、车控状态和证据字段。
inputs:
- execution_result
- screenshot
- operation_log
- api_trace
- state_snapshot
rules:
- id: expected_result_observed
  type: existence
  assertion:
    target_observation: case.expected_result.summary
- id: no_unhandled_error
  type: existence
  assertion:
    forbidden_observation: unhandled_error_or_blank_page
- id: api_state_consistency
  type: consistency
  assertion:
    target: ui_state_and_api_state_consistent
supported_rule_types:
- existence
- equality
- range
- state_machine
- consistency
- schema
- data_quality
result:
  pass_condition: all_rules_passed
  failure_output:
  - failed_rule_id
  - case_id
  - actual_observation
  - expected_observation
  - evidence_ref
  - diagnostic_hint
evidence:
  required: true
  fields:
  - run_id
  - case_id
  - screenshot
  - operation_log
  - api_trace
  - state_snapshot
created_by: agent
review:
  status: draft
