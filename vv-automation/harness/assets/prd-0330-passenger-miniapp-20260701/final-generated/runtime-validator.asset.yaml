id: "VALIDATOR-CANDIDATE-HARNESS-001"
version: v1
title: 0330 乘客端小程序 PRD 通用候选用例校验器
description: 第一版通用确定性校验器，正式入库前应按模块拆分。
inputs:
  - execution_result
  - screenshot
  - operation_log
  - state_snapshot
rules:
  - id: expected_result_observed
    type: existence
    assertion:
      target_observation: case.expected_result.summary
  - id: no_unhandled_error
    type: existence
    assertion:
      forbidden_observation: unhandled_error_or_blank_page
supported_rule_types:
  - existence
  - equality
  - state_machine
  - consistency
  - data_quality
result:
  pass_condition: all_rules_passed
  failure_output:
    - failed_rule_id
    - case_id
    - actual_observation
    - expected_observation
    - evidence_ref
evidence:
  required: true
  fields:
    - run_id
    - case_id
    - screenshot
    - operation_log
    - state_snapshot
created_by: agent
review:
  status: draft
